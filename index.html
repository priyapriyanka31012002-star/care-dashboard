<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personal Operations Management Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===================== CSS RESET & BASE ===================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;
  --success:#22c55e;--success-light:#dcfce7;--success-dark:#16a34a;
  --danger:#ef4444;--danger-light:#fee2e2;--danger-dark:#dc2626;
  --warning:#f59e0b;--warning-light:#fef3c7;--warning-dark:#d97706;
  --info:#a855f7;--info-light:#f3e8ff;
  --emerald:#10b981;--emerald-light:#d1fae5;
  --cyan:#06b6d4;--cyan-light:#cffafe;
  --slate:#334155;--slate-light:#f1f5f9;--slate-bg:#f8fafc;
  --white:#ffffff;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow-md:0 4px 6px rgba(0,0,0,.1);--shadow-lg:0 10px 25px rgba(0,0,0,.12);
  --radius:10px;--radius-sm:6px;
  --sidebar-width:260px;
  --header-height:60px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--slate-bg);color:var(--slate);line-height:1.6;overflow-x:hidden}
h1,h2,h3,h4{font-weight:700;color:var(--slate)}
button{cursor:pointer;border:none;font-family:inherit;font-size:.9rem;border-radius:var(--radius-sm);padding:8px 16px;transition:all .2s}
button:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
input,textarea,select{font-family:inherit;font-size:.9rem;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);width:100%;transition:border .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

/* ===================== LAYOUT ===================== */
.app-layout{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:var(--sidebar-width);background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);color:#fff;position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar-logo{padding:18px 20px;font-size:1.15rem;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;letter-spacing:.3px}
.sidebar-logo span{font-size:1.4rem}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;font-size:.9rem;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(37,99,235,.25);color:#fff;border-left-color:var(--primary);font-weight:600}
.nav-item .icon{font-size:1.1rem;width:24px;text-align:center}

/* Main Content */
.main-area{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* Header */
.top-header{height:var(--header-height);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:90;box-shadow:var(--shadow)}
.header-left{display:flex;align-items:center;gap:14px}
.hamburger{display:none;background:none;padding:6px;font-size:1.3rem;color:var(--slate)}
.header-clock{font-size:.95rem;color:var(--slate);font-weight:600}
.header-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:var(--success-dark)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--slate)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:.82rem}

/* Page content */
.page-content{padding:24px 28px;flex:1}
.section-title{font-size:1.35rem;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:1.4rem}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-header{padding:14px 18px;font-weight:700;font-size:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

/* Grid helpers */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-1{display:grid;grid-template-columns:1fr;gap:16px}

/* KPI Cards */
.kpi-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:14px;transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.kpi-info h4{font-size:.82rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi-info .kpi-value{font-size:1.6rem;font-weight:800;color:var(--slate)}

/* Checklist items */
.check-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);transition:background .15s;border:1px solid transparent}
.check-item:hover{background:var(--slate-light);border-color:var(--border)}
.check-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--success);cursor:pointer;flex-shrink:0}
.check-item label{cursor:pointer;flex:1;font-size:.92rem}
.check-item.completed label{text-decoration:line-through;color:#94a3b8}
.check-item .timestamp{font-size:.75rem;color:#94a3b8;white-space:nowrap}

/* Progress bar */
.progress-wrap{background:#e2e8f0;border-radius:20px;height:10px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:20px;transition:width .4s}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
.badge-success{background:var(--success-light);color:var(--success-dark)}
.badge-danger{background:var(--danger-light);color:var(--danger-dark)}
.badge-warning{background:var(--warning-light);color:var(--warning-dark)}
.badge-info{background:var(--info-light);color:var(--info)}
.badge-primary{background:var(--primary-light);color:var(--primary)}

/* Alert box */
.alert-box{border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:flex-start;gap:10px;font-size:.88rem;margin-bottom:12px}
.alert-danger{background:var(--danger-light);border:1px solid #fca5a5;color:var(--danger-dark)}
.alert-warning{background:var(--warning-light);border:1px solid #fcd34d;color:var(--warning-dark)}
.alert-info{background:var(--primary-light);border:1px solid #93c5fd;color:var(--primary-dark)}
.alert-success{background:var(--success-light);border:1px solid #86efac;color:var(--success-dark)}

/* Inventory row */
.inv-row{display:grid;grid-template-columns:2fr 140px 1fr 100px 80px;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)}
.inv-row:last-child{border-bottom:none}
.inv-row .item-name{font-weight:600;font-size:.9rem}
.inv-row .item-cat{font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.qty-controls{display:flex;align-items:center;gap:0}
.qty-controls button{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;border-radius:0;padding:0}
.qty-controls button:first-child{border-radius:6px 0 0 6px}
.qty-controls button:last-child{border-radius:0 6px 6px 0}
.qty-controls input{width:50px;text-align:center;border-radius:0;border-left:none;border-right:none;padding:5px;height:32px}

/* Meal card */
.meal-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s}
.meal-card.done{border-color:var(--success)}
.meal-time{font-size:.78rem;font-weight:700;text-transform:uppercase;color:var(--primary);margin-bottom:6px}

/* Log entry */
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:.88rem}
.log-entry:last-child{border-bottom:none}
.log-entry .log-time{font-size:.75rem;color:#94a3b8;white-space:nowrap;min-width:90px}
.log-entry .log-text{flex:1}
.log-entry .del-btn{background:none;color:#cbd5e1;font-size:.85rem;padding:2px 6px}
.log-entry .del-btn:hover{color:var(--danger)}

/* Hour pills */
.hour-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.hour-pill{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:#94a3b8}
.hour-pill.done{background:var(--success-light);color:var(--success-dark);border-color:var(--success)}
.hour-pill.current{border-color:var(--primary);color:var(--primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.2)}50%{box-shadow:0 0 0 6px rgba(37,99,235,0)}}

/* File upload area */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:36px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--slate-light)}
.upload-area:hover,.upload-area.drag{border-color:var(--primary);background:var(--primary-light)}
.upload-area .upload-icon{font-size:2.4rem;margin-bottom:8px}

/* Section category label */
.cat-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--primary);padding:8px 14px;background:var(--primary-light);border-radius:var(--radius-sm);margin:14px 0 6px}

/* ===================== DASHBOARD ENHANCEMENTS ===================== */

/* Action Cards */
.action-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .2s;text-align:left;width:100%}
.action-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--primary)}
.action-card .action-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.action-card .action-text h4{font-size:.92rem;font-weight:700;color:var(--slate);margin-bottom:2px}
.action-card .action-text p{font-size:.78rem;color:#94a3b8;margin:0}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border)}
.timeline-item{display:flex;align-items:center;gap:12px;padding:7px 12px;position:relative;border-radius:var(--radius-sm);transition:background .15s}
.timeline-item:hover{background:var(--slate-light)}
.timeline-item .tl-dot{position:absolute;left:-21px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--white);z-index:1;flex-shrink:0}
.timeline-item.tl-done .tl-dot{background:var(--success);border-color:var(--success)}
.timeline-item.tl-current .tl-dot{background:var(--primary);border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-light)}
.timeline-item.tl-missed .tl-dot{background:var(--danger);border-color:var(--danger)}
.timeline-item .tl-time{font-size:.82rem;font-weight:700;min-width:68px;color:var(--slate)}
.timeline-item .tl-status{font-size:.75rem;font-weight:600}

/* Stock Level Labels */
.stock-label{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;min-width:50px;text-align:center}
.stock-good{background:var(--success-light);color:var(--success-dark)}
.stock-medium{background:var(--warning-light);color:var(--warning-dark)}
.stock-low{background:var(--danger-light);color:var(--danger-dark)}

/* Category Group */
.inv-category-group{margin-bottom:14px}
.inv-category-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--primary);padding:6px 12px;background:var(--primary-light);border-radius:var(--radius-sm) var(--radius-sm) 0 0;display:flex;align-items:center;gap:6px}
.inv-category-items{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);overflow:hidden}

/* Summary Card */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.summary-stat{text-align:center;padding:14px 10px;background:var(--slate-light);border-radius:var(--radius-sm)}
.summary-stat .stat-value{font-size:1.5rem;font-weight:800;color:var(--primary)}
.summary-stat .stat-label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* Today's Tasks */
.task-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);font-size:.88rem;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-item .task-status{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.task-status.task-done{background:var(--success-light);color:var(--success-dark)}
.task-status.task-pending{background:var(--slate-light);color:#94a3b8}

/* View-all link */
.view-all-link{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;margin-top:8px;font-size:.82rem;font-weight:600;color:var(--primary);background:var(--primary-light);border-radius:var(--radius-sm);cursor:pointer;border:none;transition:all .2s}
.view-all-link:hover{background:var(--primary);color:#fff}

/* ===================== HOURLY PAGE ENHANCEMENTS ===================== */

/* Enhanced checklist items */
.hc-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);transition:all .2s;margin-bottom:10px}
.hc-item:hover{border-color:var(--primary-light);box-shadow:var(--shadow)}
.hc-item.hc-done{border-color:var(--success);background:#f0fdf4}
.hc-item .hc-check{width:26px;height:26px;accent-color:var(--success);cursor:pointer;flex-shrink:0;margin-top:2px}
.hc-item .hc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.hc-item .hc-content{flex:1;min-width:0}
.hc-item .hc-label{font-size:.92rem;font-weight:600;color:var(--slate);cursor:pointer}
.hc-item.hc-done .hc-label{text-decoration:line-through;color:#94a3b8}
.hc-item .hc-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.hc-item .hc-note-input{font-size:.8rem;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;max-width:260px;margin-top:6px}
.hc-item .hc-photo-btn{font-size:.72rem;padding:3px 10px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:var(--slate-light);color:#64748b;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .2s}
.hc-item .hc-photo-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* Status indicator badges for hourly */
.status-indicator{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700}
.si-completed{background:var(--success-light);color:var(--success-dark)}
.si-pending{background:var(--warning-light);color:var(--warning-dark)}
.si-attention{background:var(--danger-light);color:var(--danger-dark)}
.si-missed{background:#fee2e2;color:#dc2626}

/* Log history enhanced */
.log-hist-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border-bottom:1px solid var(--border);transition:background .15s}
.log-hist-item:hover{background:var(--slate-light)}
.log-hist-item:last-child{border-bottom:none}
.log-hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.log-hist-dot.lh-green{background:var(--success)}
.log-hist-dot.lh-yellow{background:var(--warning)}
.log-hist-dot.lh-red{background:var(--danger)}
.log-hist-dot.lh-gray{background:#cbd5e1}

/* Issue report card */
.issue-form{display:flex;flex-direction:column;gap:12px}
.priority-selector{display:flex;gap:8px}
.priority-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.priority-btn:hover{transform:translateY(-1px)}
.priority-btn.pr-low{border-color:var(--success);color:var(--success-dark)}
.priority-btn.pr-low.pr-active{background:var(--success);color:#fff}
.priority-btn.pr-med{border-color:var(--warning);color:var(--warning-dark)}
.priority-btn.pr-med.pr-active{background:var(--warning);color:#fff}
.priority-btn.pr-high{border-color:var(--danger);color:var(--danger-dark)}
.priority-btn.pr-high.pr-active{background:var(--danger);color:#fff}
.issue-entry{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;background:var(--slate-light)}
.issue-priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}

/* Env status cards */
.env-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.env-card{text-align:center;padding:16px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);transition:all .2s}
.env-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.env-card .env-icon{font-size:1.8rem;margin-bottom:6px}
.env-card .env-label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.env-card .env-value{font-size:1rem;font-weight:800;color:var(--slate)}
.env-card .env-status{margin-top:6px}

/* Activity notes */
.note-entry{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-left:3px solid var(--primary);margin-bottom:8px;background:var(--slate-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.note-entry .note-time{font-size:.72rem;color:#94a3b8;white-space:nowrap;min-width:70px;padding-top:2px}
.note-entry .note-text{flex:1;font-size:.88rem}
.note-entry .note-del{background:none;border:none;color:#cbd5e1;font-size:.85rem;padding:2px 6px;cursor:pointer}
.note-entry .note-del:hover{color:var(--danger)}

/* Low stock quick alert banner */
.low-stock-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--radius-sm);background:var(--warning-light);border:1px solid #fcd34d;margin-bottom:10px;font-size:.85rem}
.low-stock-banner .lsb-icon{font-size:1.2rem}
.low-stock-banner .lsb-items{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.lsb-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;background:#fff;font-size:.76rem;font-weight:600;border:1px solid #fcd34d;color:var(--warning-dark)}

/* ===================== V2 CARETAKER ENHANCEMENTS ===================== */

/* Patient Status Cards */
.patient-header{display:flex;align-items:center;gap:16px;padding:18px;background:linear-gradient(135deg,#1e293b,#334155);border-radius:var(--radius);color:#fff;margin-bottom:20px}
.patient-avatar{width:60px;height:60px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.patient-info h3{font-size:1.1rem;color:#fff;margin-bottom:2px}
.patient-info p{font-size:.82rem;color:rgba(255,255,255,.7);margin:0}
.status-field{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.status-field:last-child{border-bottom:none}
.status-field .sf-label{font-size:.82rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.status-field .sf-value{font-weight:700;font-size:.9rem}
.pain-scale{display:flex;gap:4px}
.pain-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;transition:all .2s}
.pain-dot:hover{transform:scale(1.15)}
.pain-dot.active{color:#fff;border-color:transparent}

/* Hospital Visit Checklist Phases */
.visit-phase{margin-bottom:16px}

    html+='<p style="color:#64748b;font-size:9pt">Generated: '+fmtDate(clock)+' '+fmtTime(clock)+'</p>';
    tmpl.sections.forEach(sec=>{
      html+='<h2>'+sec.title+'</h2><table><tr><th style="width:30px">#</th><th style="width:30px">✓</th><th>Item</th><th style="width:120px">Notes</th></tr>';
      sec.items.forEach((item,i)=>{
        html+='<tr><td>'+(i+1)+'</td><td><span class="cb"></span></td><td>'+item+'</td><td></td></tr>';
      });
      html+='</table>';
    });
    html+='</body></html>';
    const blob=new Blob([html],{type:'application/msword'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=tmpl.name.replace(/\s+/g,'-').toLowerCase()+'.doc';a.click();
  };

  // — Printable download (opens print-friendly window) —
  const downloadPrintable=(tmpl)=>{
    let h='<!DOCTYPE html><html><head><meta charset="utf-8"/><title>'+tmpl.name+'</title><style>';
    h+='@media print{@page{margin:15mm 20mm}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}';
    h+='body{font-family:Calibri,Arial,sans-serif;margin:30px 40px;color:#1e293b;font-size:10pt}';
    h+='h1{font-size:18pt;border-bottom:3px solid #2563eb;padding-bottom:6px;margin-bottom:2px}';
    h+='.date{font-size:8pt;color:#94a3b8;margin-bottom:18px}';
    h+='h2{font-size:12pt;color:#2563eb;margin-top:16px;margin-bottom:6px;border-bottom:1px solid #e2e8f0;padding-bottom:3px}';
    h+='.item{display:flex;align-items:baseline;gap:8px;padding:3px 0;border-bottom:1px dotted #e2e8f0;font-size:9.5pt}';
    h+='.cb{width:12px;height:12px;border:1.5px solid #64748b;display:inline-block;flex-shrink:0;margin-top:2px}';
    h+='.nt{font-size:7.5pt;color:#94a3b8;font-style:italic;margin-left:auto}';
    h+='.ft{margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px;font-size:8pt;color:#94a3b8;display:flex;justify-content:space-between}';
    h+='</style></head><body>';
    h+='<h1>'+tmpl.name+'</h1><div class="date">Generated: '+fmtDate(clock)+' '+fmtTime(clock)+'</div>';
    tmpl.sections.forEach(sec=>{
      h+='<h2>'+sec.title+'</h2>';
      sec.items.forEach((item,i)=>{
        const txt=typeof item==='string'?item:item.text||String(item);
        h+='<div class="item"><span class="cb"></span><span>'+(i+1)+'. '+txt+'</span></div>';
      });
    });
    h+='<div class="ft"><span>Signature: __________________</span><span>Date: __________</span></div>';
    h+='</body></html>';
    const w=window.open('','_blank');
    if(w){w.document.write(h);w.document.close();setTimeout(()=>w.print(),500)}
  };

  // ======================== DOCUMENT ENGINE — Data Collectors ========================
  const collectModuleData=(modId)=>{
    switch(modId){
      case 'patient': return {title:'Patient Status',icon:'🏥',sections:[{title:'Patient Information',items:[
        {id:uid(),text:'Patient Name: '+(patientStatus.name||'Not set'),done:!!patientStatus.name,note:''},
        {id:uid(),text:'Health Status: '+patientStatus.healthStatus,done:true,note:''},
        {id:uid(),text:'Pain Level: '+patientStatus.painLevel+'/10',done:true,note:''},
        {id:uid(),text:'Mood: '+patientStatus.mood,done:true,note:''},
        {id:uid(),text:'Mobility Support: '+patientStatus.mobility,done:true,note:''},
        {id:uid(),text:'Visit Status: '+patientStatus.visitStatus,done:patientStatus.visitStatus==='Completed',note:''},
        ...(patientStatus.doctorInstructions?[{id:uid(),text:'Doctor Instructions: '+patientStatus.doctorInstructions,done:true,note:''}]:[])
      ]}]};
      case 'hospital': return {title:'Hospital Visit',icon:'🏨',sections:[
        {title:'Before Leaving Home',items:VISIT_BEFORE.map((t,i)=>({id:uid(),text:t,done:visitBefore[i],note:''}))},
        {title:'At the Hospital',items:VISIT_DURING.map((t,i)=>({id:uid(),text:t,done:visitDuring[i],note:''}))},
        {title:'After Returning',items:VISIT_AFTER.map((t,i)=>({id:uid(),text:t,done:visitAfter[i],note:''}))}
      ]};
      case 'healthobs': return {title:'Health Observation',icon:'❤️',sections:[
        {title:'Current Health Status',items:[
          {id:uid(),text:'Pain: '+healthObs.pain,done:healthObs.pain==='None',note:''},
          {id:uid(),text:'Headache: '+healthObs.headache,done:healthObs.headache==='None',note:''},
          {id:uid(),text:'Distress: '+healthObs.distress,done:healthObs.distress==='None',note:''},
          {id:uid(),text:'Fatigue: '+healthObs.fatigue,done:healthObs.fatigue==='None',note:''},
          {id:uid(),text:'Medication Taken: '+healthObs.medication,done:healthObs.medication==='Yes',note:''},
          {id:uid(),text:'Appetite: '+healthObs.appetite,done:healthObs.appetite==='Good',note:''}
        ]},
        ...(healthNotes.length?[{title:'Health Notes',items:healthNotes.map(n=>({id:uid(),text:'['+fmtShort(n.time)+'] '+n.text,done:true,note:''}))}]:[])
      ]};
      case 'hourly': return {title:'Hourly Checklist',icon:'🕐',sections:[
        {title:'Environment Check Items',items:HOURLY_ITEMS.map((t,i)=>({id:uid(),text:t,done:currentHourItems[i],note:hourlyNotes[i]||''}))},
        {title:'Hours Logged Today',items:HOURS.map(h=>{const lg=hourlyChecks[h];return{id:uid(),text:(h>12?h-12:h||12)+':00 '+(h>=12?'PM':'AM'),done:!!lg,note:lg?'Logged '+fmtShort(lg.time):(h<clock.getHours()?'Missed':'Upcoming')}})},
        ...(hourlyActivityNotes.length?[{title:'Activity Notes',items:hourlyActivityNotes.map(n=>({id:uid(),text:'['+fmtShort(n.time)+'] '+n.text,done:true,note:''}))}]:[]),
        ...(issueReports.length?[{title:'Issue Reports',items:issueReports.map(r=>({id:uid(),text:'['+r.priority.toUpperCase()+'] '+r.desc,done:false,note:r.photo||''}))}]:[])
      ]};
      case 'mobility': return {title:'Mobility Tracker',icon:'🦯',sections:[{title:'Mobility Checklist',items:MOBILITY_ITEMS.map((m,i)=>({id:uid(),text:m.label,done:mobilityChecks[i],note:''}))}]};
      case 'night': return {title:'Night Preparation',icon:'🌙',sections:[{title:'Night Tasks',items:nightTasks.map(t=>({id:uid(),text:t.label+(t.value?' — '+t.value:''),done:t.done,note:''}))}]};
      case 'morning': return {title:'Morning Packing',icon:'🌅',sections:[{title:'Packing Checklist',items:MORNING_ITEMS.map((t,i)=>({id:uid(),text:t,done:morningItems[i],note:''}))}]};
      case 'meals': return {title:'Meal Planning',icon:'🍽️',sections:[{title:"Today's Meals",items:meals.map(m=>({id:uid(),text:m.label+' ('+m.time+'): '+(m.plan||'No plan set'),done:m.prepared&&m.electrolyte,note:(m.prepared?'Prepared ':'')+(m.electrolyte?'Electrolyte':'')}))}]};
      case 'inventory': return {title:'Inventory',icon:'📦',sections:(()=>{const cs=[...new Set(inventory.map(x=>x.cat))];return cs.map(cat=>({title:cat,items:inventory.filter(x=>x.cat===cat).map(x=>({id:uid(),text:x.name+': '+x.qty+'/'+x.target,done:x.qty>=x.target,note:x.qty<x.target?'LOW STOCK':'OK'}))}))})()};
      case 'ordering': return {title:'Ordering',icon:'🛒',sections:[{title:'Order List',items:orderItems.length?orderItems.map(o=>({id:uid(),text:o.name+' ×'+o.qty+' ['+o.cat+']',done:false,note:fmtShort(o.time)})):[{id:uid(),text:'No orders placed today',done:false,note:''}]}]};
      case 'reports': return {title:'Medical Reports',icon:'📄',sections:[
        ...(doctorNotes.length?[{title:'Doctor Notes',items:doctorNotes.map(n=>({id:uid(),text:'['+fmtShort(n.time)+'] '+n.text,done:true,note:''}))}]:[]),
        ...(files.length?[{title:'Uploaded Documents',items:files.map(f=>({id:uid(),text:f.name,done:true,note:(f.size/1024).toFixed(1)+' KB'}))}]:[]),
        ...(!doctorNotes.length&&!files.length?[{title:'Reports',items:[{id:uid(),text:'No reports recorded',done:false,note:''}]}]:[])
      ]};
      case 'carelog': return {title:'Daily Care Log',icon:'📖',sections:[{title:'Care Timeline',items:careLogs.length?careLogs.map(l=>({id:uid(),text:'['+fmtShort(l.time)+'] '+l.text,done:true,note:''})):[{id:uid(),text:'No entries recorded',done:false,note:''}]}]};
      case 'comms': return {title:'Communication',icon:'💬',sections:[{title:'Communication Log',items:commLogs.length?commLogs.map(l=>({id:uid(),text:'['+fmtShort(l.time)+'] '+l.text,done:true,note:''})):[{id:uid(),text:'No logs recorded',done:false,note:''}]}]};
      case 'transport': return {title:'Transport',icon:'🚗',sections:[
        {title:'Transport Details',items:[
          {id:uid(),text:'Driver: '+(transport.driver||'Not set'),done:!!transport.driver,note:''},
          {id:uid(),text:'Appt Time: '+(transport.apptTime||'Not set'),done:!!transport.apptTime,note:''},
          {id:uid(),text:'Appt Type: '+(transport.apptType||'Not set'),done:!!transport.apptType,note:''}
        ]},
        {title:'Pre-Departure Checklist',items:TRANSPORT_CHECKS.map((t,i)=>({id:uid(),text:t,done:transport.checks[i],note:''}))}
      ]};
      case 'laundry': return {title:'Laundry',icon:'👕',sections:[{title:'Laundry Cycles',items:laundry.length?laundry.map(l=>({id:uid(),text:l.type+' — '+l.status,done:l.status==='Completed',note:fmtShort(l.time)})):[{id:uid(),text:'No cycles logged',done:false,note:''}]}]};
      case 'observations': return {title:'Observations',icon:'📋',sections:[{title:'Observation Log',items:obsLogs.length?obsLogs.map(l=>({id:uid(),text:'['+fmtShort(l.time)+'] '+l.text,done:true,note:''})):[{id:uid(),text:'No observations',done:false,note:''}]}]};
      case 'emergency': return {title:'Emergency',icon:'🚨',sections:[
        {title:'Emergency Contacts',items:emergencyContacts.map(c=>({id:uid(),text:c.role+': '+(c.name||'Not set')+' — '+(c.phone||'No phone'),done:!!c.name&&!!c.phone,note:''}))},
        {title:'Watch Symptoms',items:EMERGENCY_SYMPTOMS.map(s=>({id:uid(),text:s.label,done:false,note:''}))}
      ]};
      case 'carechecklist': return {title:'Patient Care',icon:'📝',sections:CARE_CHECKLIST_SECTIONS.map(sec=>({
        title:sec.icon+' '+sec.title,
        items:sec.tasks.map((t,i)=>({id:uid(),text:t,done:(careChecklist[sec.id]||[])[i]||false,note:''}))
      }))};
      default: return {title:'Unknown',icon:'❓',sections:[]};
    }
  };

  // ======================== MASTER BUILDER HANDLERS ========================
  const toggleMasterModule=(modId)=>setMasterModules(p=>p.includes(modId)?p.filter(m=>m!==modId):[...p,modId]);
  const selectAllModules=()=>setMasterModules(MODULE_REGISTRY.map(m=>m.id));
  const clearModuleSelection=()=>{setMasterModules([]);setMasterSections([])};

  const buildMasterSections=()=>{
    const secs=[];
    masterModules.forEach(modId=>{
      const mod=MODULE_REGISTRY.find(m=>m.id===modId);
      const data=collectModuleData(modId);
      data.sections.forEach(sec=>{
        secs.push({id:uid(),title:sec.title,moduleIcon:mod?mod.icon:'📋',moduleName:data.title,items:sec.items.map(it=>({...it,id:it.id||uid()}))});
      });
    });
    setMasterSections(secs);
  };

  const moveMasterSection=(idx,dir)=>{
    setMasterSections(p=>{const n=[...p];const ni=idx+dir;if(ni<0||ni>=n.length)return p;[n[idx],n[ni]]=[n[ni],n[idx]];return n});
  };
  const removeMasterSection=(idx)=>setMasterSections(p=>p.filter((_,i)=>i!==idx));
  const updateMasterSectionTitle=(idx,val)=>setMasterSections(p=>{const n=[...p];n[idx]={...n[idx],title:val};return n});
  const addMasterItem=(si)=>setMasterSections(p=>{const n=[...p];n[si]={...n[si],items:[...n[si].items,{id:uid(),text:'New item',done:false,note:''}]};return n});
  const removeMasterItem=(si,ii)=>setMasterSections(p=>{const n=[...p];n[si]={...n[si],items:n[si].items.filter((_,i)=>i!==ii)};return n});
  const updateMasterItem=(si,ii,field,val)=>{
    setMasterSections(p=>{const n=[...p];const items=[...n[si].items];items[ii]={...items[ii],[field]:val};n[si]={...n[si],items};return n});
  };
  const moveMasterItem=(si,ii,dir)=>{
    setMasterSections(p=>{const n=[...p];const items=[...n[si].items];const ni=ii+dir;if(ni<0||ni>=items.length)return p;[items[ii],items[ni]]=[items[ni],items[ii]];n[si]={...n[si],items};return n});
  };
  const addMasterSection=()=>setMasterSections(p=>[...p,{id:uid(),title:'Custom Section',moduleIcon:'📝',moduleName:'Custom',items:[{id:uid(),text:'New item',done:false,note:''}]}]);

  const masterToTemplate=()=>({
    name:masterTitle||'Care Checklist',
    sections:masterSections.map(s=>({title:s.title,items:s.items.map(i=>(i.done?'✅ ':'☐ ')+i.text+(i.note?' ['+i.note+']':''))}))
  });

  const saveMasterAsTemplate=()=>{
    if(!masterTitle.trim()||masterSections.length===0)return;
    setSavedMasters(p=>[{id:uid(),name:masterTitle,moduleIds:[...masterModules],sections:masterSections.map(s=>({title:s.title,items:s.items.map(i=>i.text)})),createdAt:new Date()},...p]);
  };
  const loadSavedMaster=(tpl)=>{
    setMasterTitle(tpl.name);
    setMasterModules(tpl.moduleIds||[]);
    setMasterSections(tpl.sections.map(s=>({id:uid(),title:s.title,moduleIcon:'📝',moduleName:'Saved',items:s.items.map(text=>({id:uid(),text,done:false,note:''}))})));
    setDocView('master');
  };
  const deleteSavedMaster=(id)=>setSavedMasters(p=>p.filter(m=>m.id!==id));

  const startMasterBuilder=()=>{
    setMasterTitle('Daily Care Checklist — '+fmtDate(clock));
    setMasterModules([]);
    setMasterSections([]);
    setDocView('master');
  };

  const downloadFullCareChecklist=(format)=>{
    const allSecs=[];
    MODULE_REGISTRY.forEach(mod=>{
      const data=collectModuleData(mod.id);
      data.sections.forEach(sec=>{
        allSecs.push({title:mod.icon+' '+data.title+' — '+sec.title,items:sec.items.map(i=>(i.done?'✅ ':'☐ ')+i.text+(i.note?' ['+i.note+']':''))});
      });
    });
    const tmpl={name:'Full Daily Care Checklist — '+fmtDate(clock),sections:allSecs};
    if(format==='docx')downloadDOCX(tmpl);
    else if(format==='xlsx')downloadXLSX(tmpl);
    else if(format==='print')downloadPrintable(tmpl);
    else downloadPDF(tmpl);
  };

  // ======================== RENDER PAGES ========================

  // ---- DASHBOARD ----
  const DashboardPage=()=>{
    const currentHour=clock.getHours();
    const visibleAlerts=showAllAlerts?lowStockItems:lowStockItems.slice(0,5);

    // Today's tasks aggregation
    const morningDone=morningItems.filter(Boolean).length;
    const nightDone=nightTasks.filter(t=>t.done).length;
    const mealsDone=meals.filter(m=>m.prepared).length;
    const todayTasks=[
      {label:'Morning Packing Checklist',done:morningDone===MORNING_ITEMS.length,detail:`${morningDone}/${MORNING_ITEMS.length}`},
      {label:'Hourly Environment Checks',done:hourlyCount>=10,detail:`${hourlyCount}/17 hours`},
      {label:'Night Preparation',done:nightDone===NIGHT_TASKS.length,detail:`${nightDone}/${NIGHT_TASKS.length}`},
      {label:'Meal Planning & Prep',done:mealsDone===meals.length,detail:`${mealsDone}/${meals.length} meals`},
      {label:'Inventory Review',done:lowStockItems.length===0,detail:lowStockItems.length===0?'All stocked':`${lowStockItems.length} low`},
      {label:'Observations Logged',done:obsLogs.length>0,detail:`${obsLogs.length} entries`}
    ];
    const tasksCompleted=todayTasks.filter(t=>t.done).length;

    // Group inventory by category
    const invByCategory={};
    inventory.forEach(item=>{
      if(!invByCategory[item.cat])invByCategory[item.cat]=[];
      invByCategory[item.cat].push(item);
    });

    const stockLabel=(p)=>p>=100?{cls:'stock-good',text:'Good'}:p>=60?{cls:'stock-medium',text:'Medium'}:{cls:'stock-low',text:'Low'};

    return(
    <div>
      <PageHeader icon="📊" title="Operations Dashboard"/>

      {/* KPI Cards */}
      <div className="grid-4" style={{marginBottom:20}}>
        <div className="kpi-card">
          <div className="kpi-icon" style={{background:'#dbeafe',color:'#2563eb'}}>🕐</div>
          <div className="kpi-info"><h4>Hourly Checks</h4><div className="kpi-value">{hourlyCount}</div></div>
        </div>
        <div className="kpi-card">
          <div className="kpi-icon" style={{background:'#dcfce7',color:'#22c55e'}}>📈</div>
          <div className="kpi-info"><h4>Completion Rate</h4><div className="kpi-value">{completionRate}%</div></div>
        </div>
        <div className="kpi-card">
          <div className="kpi-icon" style={{background:'#f3e8ff',color:'#a855f7'}}>📦</div>
          <div className="kpi-info"><h4>Inv. At Target</h4><div className="kpi-value">{invAtTarget}/{inventory.length}</div></div>
        </div>
        <div className="kpi-card">
          <div className="kpi-icon" style={{background:'#d1fae5',color:'#10b981'}}>✅</div>
          <div className="kpi-info"><h4>Critical Ready</h4><div className="kpi-value">{critReady}/8</div></div>
        </div>
      </div>

      {/* Daily Summary Card */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">📋 Daily Summary</div>
        <div className="card-body">
          <div className="summary-grid">
            <div className="summary-stat">
              <div className="stat-value">{tasksCompleted}/{todayTasks.length}</div>
              <div className="stat-label">Tasks Done</div>
            </div>
            <div className="summary-stat">
              <div className="stat-value" style={{color:lowStockItems.length>0?'#ef4444':'#22c55e'}}>{lowStockItems.length}</div>
              <div className="stat-label">Active Alerts</div>
            </div>
            <div className="summary-stat">
              <div className="stat-value">{hourlyCount}/17</div>
              <div className="stat-label">Hours Logged</div>
            </div>
          </div>
        </div>
      </div>

      {/* Critical Alerts — limited to 5 with View All */}
      {lowStockItems.length>0&&(
        <div className="card" style={{marginBottom:20,borderLeft:'4px solid var(--danger)'}}>
          <div className="card-header" style={{color:'var(--danger)'}}>⚠️ Critical Alerts — Low Stock Items ({lowStockItems.length})</div>
          <div className="card-body" style={{maxHeight:showAllAlerts?'none':'240px',overflow:'hidden'}}>
            {visibleAlerts.map(i=>(
              <div key={i.id} className="alert-box alert-danger" style={{marginBottom:6}}>
                <span>🔴</span><span><strong>{i.name}</strong> — {i.qty}/{i.target} ({pct(i.qty,i.target)}%)</span>
              </div>
            ))}
          </div>
          {lowStockItems.length>5&&(
            <div style={{padding:'0 18px 14px'}}>
              <button className="view-all-link" onClick={()=>setShowAllAlerts(!showAllAlerts)}>
                {showAllAlerts?'▲ Show Less':'▼ View All '+lowStockItems.length+' Alerts'}
              </button>
            </div>
          )}
        </div>
      )}

      <div className="grid-2" style={{marginBottom:20}}>
        {/* Today's Tasks Checklist */}
        <div className="card">
          <div className="card-header">✅ Today's Tasks</div>
          <div className="card-body" style={{padding:0}}>
            {todayTasks.map((task,i)=>(
              <div key={i} className="task-item">
                <div className={`task-status ${task.done?'task-done':'task-pending'}`}>{task.done?'✓':'○'}</div>
                <span style={{flex:1,fontWeight:600,color:task.done?'#94a3b8':'var(--slate)',textDecoration:task.done?'line-through':'none'}}>{task.label}</span>
                <span className={`badge ${task.done?'badge-success':'badge-warning'}`}>{task.detail}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Quick Actions — modern action cards */}
        <div className="card">
          <div className="card-header">⚡ Quick Actions</div>
          <div className="card-body" style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="action-card" onClick={()=>navigate('hourly')}>
              <div className="action-icon" style={{background:'#dbeafe',color:'#2563eb'}}>🕐</div>
              <div className="action-text"><h4>Log Hourly Check</h4><p>Record environment checklist for current hour</p></div>
            </button>
            <button className="action-card" onClick={generateReport}>
              <div className="action-icon" style={{background:'#dcfce7',color:'#22c55e'}}>📥</div>
              <div className="action-text"><h4>Download Daily Report</h4><p>Generate and save today's full operations report</p></div>
            </button>
            <button className="action-card" onClick={()=>navigate('inventory')}>
              <div className="action-icon" style={{background:'#fef3c7',color:'#d97706'}}>📦</div>
              <div className="action-text"><h4>Update Inventory</h4><p>Adjust stock quantities and review levels</p></div>
            </button>
            <button className="action-card" onClick={()=>navigate('meals')}>
              <div className="action-icon" style={{background:'#f3e8ff',color:'#a855f7'}}>🍽️</div>
              <div className="action-text"><h4>Meal Planning</h4><p>Plan meals and track electrolyte intake</p></div>
            </button>
          </div>
        </div>
      </div>

      {/* Hourly Log — Timeline view */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">📅 Today's Hour Log</div>
        <div className="card-body">
          <div className="timeline">
            {HOURS.map(h=>{
              const done=!!hourlyChecks[h];
              const cur=currentHour===h;
              const missed=!done&&!cur&&h<currentHour;
              const cls=done?'tl-done':cur?'tl-current':missed?'tl-missed':'';
              return(
                <div key={h} className={`timeline-item ${cls}`}>
                  <div className="tl-dot"/>
                  <span className="tl-time">{h>12?h-12:h||12}:00 {h>=12?'PM':'AM'}</span>
                  {done&&<span className="badge badge-success">Logged {fmtShort(hourlyChecks[h].time)}</span>}
                  {cur&&<span className="badge badge-primary">Current</span>}
                  {missed&&<span className="badge badge-danger">Missed</span>}
                  {!done&&!cur&&!missed&&<span className="badge" style={{background:'#f1f5f9',color:'#94a3b8'}}>Upcoming</span>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Inventory Overview — grouped by category with stock labels */}
      <div className="card">
        <div className="card-header">📊 Inventory Overview</div>
        <div className="card-body">
          {Object.entries(invByCategory).map(([cat,items])=>(

  // ---- PATIENT CARE CHECKLIST ----
  const CareChecklistPage=()=>{
    const totalTasks=CARE_CHECKLIST_SECTIONS.reduce((s,sec)=>s+sec.tasks.length,0);
    const doneTasks=CARE_CHECKLIST_SECTIONS.reduce((s,sec)=>s+(careChecklist[sec.id]||[]).filter(Boolean).length,0);

    const allDone=doneTasks===totalTasks;

    return(
      <div className="page-content">
        <PageHeader icon="📝" title="Patient Care Checklist"/>

        {/* Overall Progress KPI Row */}

          <div className="kpi-card">

          </div>
          <div className="kpi-card">
            <div className="kpi-icon" style={{background:'#dcfce7'}}>✅</div>
            <div className="kpi-info"><h4>Completed</h4><div className="kpi-value">{doneTasks}</div></div>
          </div>
          <div className="kpi-card">
            <div className="kpi-icon" style={{background:'#fee2e2'}}>⏳</div>
            <div className="kpi-info"><h4>Remaining</h4><div className="kpi-value">{totalTasks-doneTasks}</div></div>
          </div>
          <div className="kpi-card">
            <div className="kpi-icon" style={{background:allDone?'#dcfce7':'#fef3c7'}}>{allDone?'🎉':'📊'}</div>
            <div className="kpi-info"><h4>Progress</h4><div className="kpi-value">{overallPct}%</div></div>
          </div>
        </div>

        {/* Overall progress bar */}
        <div className="card" style={{marginBottom:20}}>
          <div className="card-body" style={{display:'flex',alignItems:'center',gap:16}}>
            <span style={{fontWeight:700,fontSize:'.9rem',minWidth:130}}>Overall Progress</span>
            <div className="progress-wrap" style={{flex:1,height:14}}>
              <div className="progress-fill" style={{width:overallPct+'%',background:overallPct===100?'#22c55e':overallPct>=50?'#2563eb':'#f59e0b'}}/>
            </div>
            <span className={`badge ${allDone?'badge-success':'badge-warning'}`}>{allDone?'All Complete':'In Progress'}</span>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-sm btn-outline" onClick={resetCareChecklist}>🔄 Reset</button>

            const checks=careChecklist[sec.id]||[];
            const done=checks.filter(Boolean).length;
            const total=sec.tasks.length;
            const pct=total?Math.round(done/total*100):0;
            const secDone=done===total;
            return(
              <div className="card care-section-card" key={sec.id}>
                <div className="card-header" style={{background:secDone?'#dcfce7':'#f8fafc'}}>
                  <span style={{fontSize:'1.2rem'}}>{sec.icon}</span>
                  <span style={{flex:1}}>{sec.title}</span>
                  <span className={`badge ${secDone?'badge-success':pct>0?'badge-warning':'badge-info'}`}>{done}/{total}</span>
                </div>
                <div className="card-body" style={{padding:'10px 14px'}}>
                  {/* Section progress */}
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div className="progress-wrap" style={{flex:1}}>
                      <div className="progress-fill" style={{width:pct+'%',background:secDone?'#22c55e':pct>0?'#2563eb':'#e2e8f0'}}/>
                    </div>
                    <span style={{fontSize:'.78rem',fontWeight:700,color:secDone?'#16a34a':'#64748b'}}>{pct}%</span>
                  </div>
                  {/* Tasks */}
                  {sec.tasks.map((task,i)=>(
                    <div className={`check-item${checks[i]?' completed':''}`} key={i}>
                      <input type="checkbox" checked={!!checks[i]} onChange={()=>toggleCareItem(sec.id,i)}/>
                      <label onClick={()=>toggleCareItem(sec.id,i)}>{task}</label>
                      {checks[i]&&<span className="timestamp">✓</span>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {/* Notes Section */}
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header">📝 Care Notes</div>
          <div className="card-body">
            <div style={{display:'flex',gap:10,marginBottom:14}}>
              <input value={careNoteInput} onChange={e=>setCareNoteInput(e.target.value)} placeholder="Add a note about patient care..." style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addCareNote()}/>
              <button className="btn btn-primary" onClick={addCareNote}>Add Note</button>
            </div>
            {careNotes.length===0&&<p style={{color:'#94a3b8',fontSize:'.88rem',textAlign:'center',padding:12}}>No care notes yet. Add observations, reminders, or instructions above.</p>}
            {careNotes.map(n=>(
              <div className="log-entry" key={n.id}>
                <span className="log-time">{fmtTime(n.time)}</span>
                <span className="log-text">{n.text}</span>
                <button className="del-btn" onClick={()=>delCareNote(n.id)}>✕</button>
              </div>
            ))}
          </div>
        </div>

        {/* Quick Summary */}
        <div className="card">
          <div className="card-header">📊 Section Summary</div>
          <div className="card-body">
            <div className="summary-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
              {CARE_CHECKLIST_SECTIONS.map(sec=>{

                const done=checks.filter(Boolean).length;

                const secDone=done===total;
                return(
                  <div className="summary-stat" key={sec.id} style={{background:secDone?'#dcfce7':'#f1f5f9',cursor:'pointer'}} title={sec.title}>
                    <div style={{fontSize:'1.3rem',marginBottom:4}}>{sec.icon}</div>
                    <div className="stat-value" style={{color:secDone?'#16a34a':done>0?'#2563eb':'#94a3b8',fontSize:'1.1rem'}}>{done}/{total}</div>
                    <div className="stat-label" style={{fontSize:'.68rem'}}>{sec.title}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  };

          </div>

          {/* Live Preview */}
          <div className="card doc-preview-card">
            <div className="card-header">👁️ Template Preview</div>
            <div className="card-body">
              <div className="doc-preview-sheet">
                <h2 style={{textAlign:'center',fontSize:'1.3rem',marginBottom:4,color:'#1e293b'}}>{t.name}</h2>
                <p style={{textAlign:'center',fontSize:'.75rem',color:'#94a3b8',marginBottom:16}}>Date: __________ &nbsp; Prepared by: __________</p>
                {(t.sections||[]).map((sec,si)=>(
                  <div key={si} style={{marginBottom:16}}>
                    <h3 style={{fontSize:'.95rem',color:t.color||'#2563eb',borderBottom:`2px solid ${t.color||'#2563eb'}`,paddingBottom:4,marginBottom:8}}>{sec.title}</h3>
                    {(t.style==='table'||t.style==='detailed')?
                      <table className="doc-preview-table">
                        <thead><tr><th style={{width:30}}>#</th><th style={{width:30}}>✓</th><th>Item</th><th style={{width:100}}>{t.style==='detailed'?'Notes':'Status'}</th></tr></thead>
                        <tbody>{sec.items.map((item,ii)=>(
                          <tr key={ii}><td style={{textAlign:'center',color:'#94a3b8'}}>{ii+1}</td><td style={{textAlign:'center'}}>☐</td><td>{item}</td><td></td></tr>
                        ))}</tbody>
                      </table>
                    :
                      <div>
                        {sec.items.map((item,ii)=>(
                          <div key={ii} className="doc-preview-item">
                            <span className="doc-preview-checkbox">☐</span>
                            <span style={{flex:1}}>{item}</span>
                            {(t.style==='printable'||t.style==='landscape')&&<span style={{borderBottom:'1px dotted #cbd5e1',flex:'0 0 120px'}}/>}
                          </div>
                        ))}
                      </div>
                    }
                  </div>
                ))}
                <div style={{borderTop:'1px solid #e2e8f0',paddingTop:10,marginTop:16,display:'flex',justifyContent:'space-between',fontSize:'.75rem',color:'#94a3b8'}}>
                  <span>Signature: __________________</span>
                  <span>Date: __________</span>
                </div>
              </div>
            </div>
          </div>

          {/* Delete button for custom checklists */}
          {t.createdAt&&<div style={{textAlign:'right',marginTop:12}}>
            <button className="btn btn-sm btn-danger" onClick={()=>{delCustomChecklist(t.id);setDocView('gallery');setSelectedTemplate(null)}}>🗑️ Delete Custom Template</button>
          </div>}
        </div>
      );
    };

    // ---- CREATE VIEW ----
    const CreateView=()=>{
      if(!editingChecklist)return null;
      return(
        <div>
          <button className="btn btn-outline btn-sm" onClick={()=>{setDocView('gallery');setEditingChecklist(null)}} style={{marginBottom:16}}>← Back to Templates</button>
          <div className="card" style={{marginBottom:20}}>
            <div className="card-header">✏️ Create Custom Checklist</div>
            <div className="card-body">
              <div className="form-group">
                <label>Checklist Title</label>
                <input value={editingChecklist.name} onChange={e=>setEditingChecklist(p=>({...p,name:e.target.value}))} placeholder="Enter checklist name..." style={{fontSize:'1.05rem',fontWeight:600}}/>
              </div>

              {editingChecklist.sections.map((sec,si)=>(
                <div key={si} className="doc-edit-section">
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                    <span style={{fontWeight:700,color:'#2563eb',fontSize:'.8rem'}}>SECTION {si+1}</span>
                    <input value={sec.title} onChange={e=>updateSectionTitle(si,e.target.value)} style={{flex:1,fontWeight:600}}/>
                    {editingChecklist.sections.length>1&&<button className="btn btn-sm btn-danger" onClick={()=>removeSection(si)}>✕</button>}
                  </div>
                  {sec.items.map((item,ii)=>(
                    <div key={ii} style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                      <span style={{color:'#94a3b8',fontSize:'.8rem',minWidth:20}}>{ii+1}.</span>
                      <input value={item} onChange={e=>updateItem(si,ii,e.target.value)} style={{flex:1}}/>
                      <button className="btn btn-sm btn-outline" onClick={()=>moveItem(si,ii,-1)} disabled={ii===0} title="Move up">↑</button>
                      <button className="btn btn-sm btn-outline" onClick={()=>moveItem(si,ii,1)} disabled={ii===sec.items.length-1} title="Move down">↓</button>
                      {sec.items.length>1&&<button className="btn btn-sm btn-danger" onClick={()=>removeItem(si,ii)} title="Remove">✕</button>}
                    </div>
                  ))}
                  <button className="btn btn-sm btn-outline" onClick={()=>addItem(si)} style={{marginTop:4}}>+ Add Item</button>
                </div>
              ))}

              <div style={{display:'flex',gap:10,marginTop:16}}>
                <button className="btn btn-outline" onClick={addSection}>+ Add Section</button>
                <button className="btn btn-success" onClick={saveCustomChecklist} disabled={!editingChecklist.name.trim()}>💾 Save Checklist</button>
              </div>
            </div>
          </div>

          {/* Live preview of what's being created */}
          {editingChecklist.name&&<div className="card doc-preview-card">
            <div className="card-header">👁️ Live Preview</div>
            <div className="card-body">
              <div className="doc-preview-sheet">
                <h2 style={{textAlign:'center',fontSize:'1.2rem',marginBottom:6,color:'#1e293b'}}>{editingChecklist.name||'Untitled Checklist'}</h2>
                <p style={{textAlign:'center',fontSize:'.75rem',color:'#94a3b8',marginBottom:14}}>Date: __________ &nbsp; Prepared by: __________</p>
                {editingChecklist.sections.map((sec,si)=>(
                  <div key={si} style={{marginBottom:14}}>
                    <h3 style={{fontSize:'.9rem',color:'#2563eb',borderBottom:'2px solid #2563eb',paddingBottom:3,marginBottom:6}}>{sec.title}</h3>
                    {sec.items.map((item,ii)=>(
                      <div key={ii} className="doc-preview-item">
                        <span className="doc-preview-checkbox">☐</span>
                        <span>{item}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </div>}
        </div>
      );
    };

    // ---- MASTER BUILDER VIEW ----
    const MasterBuilderView=()=>{
      const totalItems=masterSections.reduce((a,s)=>a+s.items.length,0);
      const doneItems=masterSections.reduce((a,s)=>a+s.items.filter(i=>i.done).length,0);
      return(
        <div>
          {/* Title */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-body" style={{display:'flex',alignItems:'center',gap:12}}>
              <label style={{fontWeight:700,whiteSpace:'nowrap'}}>📄 Document Title:</label>
              <input value={masterTitle} onChange={e=>setMasterTitle(e.target.value)} style={{flex:1,fontSize:'1.05rem',fontWeight:600}} placeholder="Enter checklist title..."/>
            </div>
          </div>

          {/* Module Selection */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header" style={{justifyContent:'space-between'}}>
              <span>📦 Select Data Modules ({masterModules.length}/{MODULE_REGISTRY.length})</span>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-sm btn-outline" onClick={selectAllModules}>Select All</button>
                <button className="btn btn-sm btn-outline" onClick={clearModuleSelection}>Clear</button>
              </div>
            </div>
            <div className="card-body">
              <div className="master-module-grid">
                {MODULE_REGISTRY.map(mod=>{
                  const sel=masterModules.includes(mod.id);
                  return(
                    <div key={mod.id} className={`master-module-card${sel?' selected':''}`} onClick={()=>toggleMasterModule(mod.id)}>
                      <span className="mod-icon">{mod.icon}</span>
                      <span style={{flex:1}}>{mod.label}</span>
                      <span className="mod-check">{sel?'✓':''}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:14,display:'flex',gap:8,alignItems:'center'}}>
                <button className="btn btn-primary" onClick={buildMasterSections} disabled={masterModules.length===0}>🔄 Load Selected Data</button>
                <span style={{fontSize:'.82rem',color:'#64748b'}}>{masterModules.length} module(s) selected</span>
              </div>
            </div>
          </div>

          {/* Sections Editor + Preview */}
          {masterSections.length>0&&(
            <div>
              {/* Download & Save Bar */}
              <div className="card" style={{marginBottom:16}}>
                <div className="card-body" style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
                  <button className="btn btn-danger" onClick={()=>downloadPDF(masterToTemplate())}>📥 PDF</button>
                  <button className="btn btn-primary" onClick={()=>downloadDOCX(masterToTemplate())}>📥 Word</button>
                  <button className="btn btn-success" onClick={()=>downloadXLSX(masterToTemplate())}>📥 Excel</button>
                  <button className="btn btn-outline" onClick={()=>downloadPrintable(masterToTemplate())}>🖨️ Print</button>
                  <div style={{marginLeft:'auto'}}/>
                  <button className="btn btn-sm btn-outline" onClick={saveMasterAsTemplate} disabled={!masterTitle.trim()}>💾 Save as Template</button>
                </div>
              </div>

              {/* Stats */}
              <div className="grid-4" style={{marginBottom:16}}>
                <div className="kpi-card"><div className="kpi-icon" style={{background:'#dbeafe'}}>📋</div><div className="kpi-info"><h4>Sections</h4><div className="kpi-value">{masterSections.length}</div></div></div>
                <div className="kpi-card"><div className="kpi-icon" style={{background:'#dcfce7'}}>✅</div><div className="kpi-info"><h4>Complete</h4><div className="kpi-value">{doneItems}</div></div></div>
                <div className="kpi-card"><div className="kpi-icon" style={{background:'#fee2e2'}}>⏳</div><div className="kpi-info"><h4>Remaining</h4><div className="kpi-value">{totalItems-doneItems}</div></div></div>
                <div className="kpi-card"><div className="kpi-icon" style={{background:doneItems===totalItems&&totalItems>0?'#dcfce7':'#fef3c7'}}>{doneItems===totalItems&&totalItems>0?'🎉':'📊'}</div><div className="kpi-info"><h4>Total</h4><div className="kpi-value">{totalItems}</div></div></div>
              </div>

              <div className="grid-2">
                {/* Left: Section Editor */}
                <div>
                  <div style={{fontSize:'.82rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',marginBottom:10}}>✏️ Edit Sections ({masterSections.length} sections)</div>
                  {masterSections.map((sec,si)=>(
                    <div key={sec.id} className="master-section-editor">
                      <div className="master-section-header">
                        <span style={{fontSize:'1.1rem'}}>{sec.moduleIcon}</span>
                        <input value={sec.title} onChange={e=>updateMasterSectionTitle(si,e.target.value)} style={{flex:1,fontWeight:600,fontSize:'.9rem'}}/>
                        <span className="sec-badge">{sec.moduleName}</span>
                        <button className="btn btn-sm btn-outline" onClick={()=>moveMasterSection(si,-1)} disabled={si===0} title="Move up">↑</button>
                        <button className="btn btn-sm btn-outline" onClick={()=>moveMasterSection(si,1)} disabled={si===masterSections.length-1} title="Move down">↓</button>
                        <button className="btn btn-sm btn-danger" onClick={()=>removeMasterSection(si)} title="Remove section">✕</button>
                      </div>
                      {sec.items.map((item,ii)=>(
                        <div key={item.id} className="master-item-row">
                          <input type="checkbox" checked={item.done} onChange={()=>updateMasterItem(si,ii,'done',!item.done)} style={{width:18,height:18,accentColor:'var(--success)',flexShrink:0}}/>
                          <input type="text" value={item.text} onChange={e=>updateMasterItem(si,ii,'text',e.target.value)}/>
                          <input className="item-note" type="text" value={item.note} onChange={e=>updateMasterItem(si,ii,'note',e.target.value)} placeholder="Note..."/>
                          <button className="btn btn-sm btn-outline" onClick={()=>moveMasterItem(si,ii,-1)} disabled={ii===0} style={{padding:'2px 6px'}}>↑</button>
                          <button className="btn btn-sm btn-outline" onClick={()=>moveMasterItem(si,ii,1)} disabled={ii===sec.items.length-1} style={{padding:'2px 6px'}}>↓</button>
                          <button className="btn btn-sm btn-danger" onClick={()=>removeMasterItem(si,ii)} style={{padding:'2px 6px'}}>✕</button>
                        </div>
                      ))}
                      <button className="btn btn-sm btn-outline" onClick={()=>addMasterItem(si)} style={{marginTop:6}}>+ Add Item</button>
                    </div>
                  ))}
                  <button className="btn btn-outline" onClick={addMasterSection} style={{marginTop:8}}>+ Add Custom Section</button>
                </div>

                {/* Right: Live Preview */}
                <div>
                  <div style={{fontSize:'.82rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',marginBottom:10}}>👁️ Document Preview</div>
                  <div className="card doc-preview-card">
                    <div className="card-body">
                      <div className="doc-preview-sheet">
                        <h2 style={{textAlign:'center',fontSize:'1.2rem',marginBottom:4,color:'#1e293b'}}>{masterTitle||'Untitled Checklist'}</h2>
                        <p style={{textAlign:'center',fontSize:'.75rem',color:'#94a3b8',marginBottom:14}}>Date: {fmtDate(clock)} &nbsp; Time: {fmtTime(clock)}</p>
                        {masterSections.map((sec,si)=>(
                          <div key={sec.id} style={{marginBottom:14}}>
                            <h3 style={{fontSize:'.9rem',color:'#2563eb',borderBottom:'2px solid #2563eb',paddingBottom:3,marginBottom:6}}>{sec.moduleIcon} {sec.title}</h3>
                            {sec.items.map((item,ii)=>(
                              <div key={item.id} className="doc-preview-item" style={{opacity:item.done?.6:1}}>
                                <span className="doc-preview-checkbox">{item.done?'✅':'☐'}</span>
                                <span style={{flex:1,textDecoration:item.done?'line-through':'none'}}>{item.text}</span>
                                {item.note&&<span style={{fontSize:'.72rem',color:'#94a3b8',fontStyle:'italic'}}>{item.note}</span>}
                              </div>
                            ))}
                          </div>
                        ))}
                        <div style={{borderTop:'1px solid #e2e8f0',paddingTop:8,marginTop:14,display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'#94a3b8'}}>
                          <span>Signature: __________________</span>
                          <span>Date: __________</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {masterSections.length===0&&masterModules.length>0&&(
            <div className="alert-box alert-info">ℹ️ Click "Load Selected Data" to pull data from the selected modules into the editor.</div>
          )}
          {masterModules.length===0&&(
            <div style={{textAlign:'center',padding:40,color:'#94a3b8'}}>
              <span style={{fontSize:'3rem',display:'block',marginBottom:10}}>🔧</span>
              <p style={{fontSize:'1rem',fontWeight:600}}>Select modules above to start building your master checklist</p>
              <p style={{fontSize:'.85rem',marginTop:6}}>Choose which data sources to include, then edit and download your combined document.</p>
            </div>
          )}
        </div>
      );
    };

    return(
      <div className="page-content">
        <PageHeader icon="📂" title="Documents & Checklists">
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {docView!=='gallery'&&<button className="btn btn-outline btn-sm" onClick={()=>{setDocView('gallery');setSelectedTemplate(null);setEditingChecklist(null);setMasterSections([])}}>📂 Gallery</button>}
            <button className="btn btn-sm btn-primary" onClick={initNewChecklist}>+ New</button>
            <button className="btn btn-sm btn-success" onClick={startMasterBuilder}>🔧 Master Builder</button>
          </div>
        </PageHeader>
        {docView==='gallery'&&<GalleryView/>}
        {docView==='preview'&&<PreviewView/>}
        {docView==='create'&&<CreateView/>}
        {docView==='master'&&<MasterBuilderView/>}
      </div>
    );
  };

  // ---- PAGE ROUTER ----
  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <DashboardPage/>;
      case 'patient': return <PatientStatusPage/>;
      case 'hospital': return <HospitalVisitPage/>;
      case 'healthobs': return <HealthObsPage/>;
      case 'hourly': return <HourlyPage/>;
      case 'mobility': return <MobilityPage/>;
      case 'night': return <NightPage/>;
      case 'morning': return <MorningPage/>;
      case 'meals': return <MealsPage/>;
      case 'inventory': return <InventoryPage/>;
      case 'ordering': return <OrderingPage/>;
      case 'reports': return <ReportsPage/>;
      case 'carelog': return <CareLogPage/>;
      case 'comms': return <CommsPage/>;
      case 'transport': return <TransportPage/>;
      case 'laundry': return <LaundryPage/>;
      case 'observations': return <ObservationsPage/>;
      case 'emergency': return <EmergencyPage/>;
      case 'carechecklist': return <CareChecklistPage/>;
      case 'documents': return <DocumentsPage/>;
      default: return <DashboardPage/>;
    }
  };

  // Auth loading state
  if(authLoading)return <div className="auth-loading"><span style={{fontSize:'2rem'}}>⏳</span> Loading Care Dashboard...</div>;
  // If not authenticated and Supabase is configured, show login
  if(!authUser&&sb)return <LoginPage/>;

  return(
    <div className="app-layout">
      {/* Demo mode banner */}
      {DEMO_MODE&&<div className="demo-banner">🔓 Demo Mode — data is stored locally only. <a href="https://supabase.com" target="_blank" style={{color:'#fff',textDecoration:'underline'}}>Set up Supabase</a> for persistent storage &amp; login.</div>}

      {/* Sidebar overlay for mobile */}
      <div className={`sidebar-overlay${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>

      {/* Sidebar */}
      <aside className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="sidebar-logo"><span>🏥</span> Ops Dashboard</div>
        <nav className="sidebar-nav">
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>navigate(n.id)}>
              <span className="icon">{n.icon}</span>{n.label}
            </div>
          ))}
        </nav>
        {authUser&&(
          <div style={{padding:'10px 20px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
            <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.6)',marginBottom:6,wordBreak:'break-all'}}>👤 {authUser.email}</div>
            <button onClick={handleLogout} className="logout-btn">🚪 Sign Out</button>
          </div>
        )}
        <div style={{padding:'14px 20px',borderTop:'1px solid rgba(255,255,255,.1)',fontSize:'.75rem',color:'rgba(255,255,255,.4)'}}>
          v2.0 — Caretaker Dashboard
        </div>
      </aside>

      {/* Main area */}
      <div className="main-area">
        <header className="top-header">
          <div className="header-left">
            <button className="hamburger" onClick={()=>setSidebarOpen(true)}>☰</button>
            <div className="header-clock">
              <div style={{fontWeight:800,fontSize:'1rem'}}>{fmtTime(clock)}</div>
              <div style={{fontSize:'.75rem',color:'#64748b'}}>{fmtDate(clock)}</div>
            </div>
          </div>
          <div className="header-right">
            {lowStockItems.length>0&&<span className="badge badge-danger" style={{cursor:'pointer'}} onClick={()=>navigate('inventory')}>⚠️ {lowStockItems.length} Low Stock</span>}
            {sb&&authUser&&(
              <button className="save-indicator" onClick={saveUserData} disabled={savingData} title={lastSaved?'Last saved: '+fmtTime(lastSaved):'Click to save'}>
                {savingData?'⏳ Saving...':lastSaved?'💾 Saved '+fmtShort(lastSaved):'💾 Save'}
              </button>
            )}
            <button className="btn btn-sm btn-success" onClick={generateReport}>📥 Report</button>
          </div>
        </header>
        <main className="page-content">
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
